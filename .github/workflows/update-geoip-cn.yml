name: Update GeoIP-CN

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # 必须拉取最新内容以确保 push 成功
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run aggregation script
        run: python aggregate.py

      - name: Install sing-box
        run: |
          bash <(curl -fsSL https://sing-box.app/deb-install.sh)
          sing-box version

      - name: Compile JSON to SRS
        run: |
          sing-box rule-set compile output/geoip-cn.json -o output/geoip-cn.srs
          echo "Compiled geoip-cn.srs successfully"

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          # 检查是否有文件更改，避免没有更新时报错
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update assets $(date +'%Y-%m-%d')"
            git push
          fi
