name: Update GeoIP-CN

on:
  schedule:
    # 每天 UTC 2:00 (北京时间 10:00) 运行
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run aggregation script
        run: python aggregate.py

      - name: Install sing-box
        run: |
          bash <(curl -fsSL https://sing-box.app/deb-install.sh)
          sing-box version

      - name: Compile JSON to SRS
        run: |
          sing-box rule-set compile output/geoip-cn.json -o output/geoip-cn.srs
          echo "Compiled geoip-cn.srs successfully"
          ls -lh output/

      - name: Generate release tag
        id: tag
        run: echo "tag=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "GeoIP-CN ${{ steps.tag.outputs.tag }}"
          body: |
            Auto-generated GeoIP-CN rule sets.
            Updated: ${{ steps.tag.outputs.tag }}

            ## Files
            - `geoip-cn.srs` - sing-box binary rule-set
            - `geoip-cn.json` - sing-box JSON rule-set source
            - `cn_ipv4.txt` - Aggregated IPv4 CIDR list
            - `cn_ipv6.txt` - Aggregated IPv6 CIDR list

            ## Sources
            - APNIC delegated
            - 17mon/china_ip_list (IPIP)
            - gaoyifan/china-operator-ip
            - missuo/ASN-China
          files: |
            output/geoip-cn.srs
            output/geoip-cn.json
            output/cn_ipv4.txt
            output/cn_ipv6.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit output to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git commit -m "chore: update geoip-cn $(date +'%Y-%m-%d')" || echo "No changes"
          git push
